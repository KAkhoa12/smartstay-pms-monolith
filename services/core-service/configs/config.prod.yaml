env: prod

server:
  name: auth-service
  host: 0.0.0.0
  port: 8081
  read_timeout: 10s
  write_timeout: 10s

database:
  host: localhost
  port: 5432
  user: postgres
  password: postgres
  db_name: smartstay_auth
  ssl_mode: require
  max_open_conns: 20
  max_idle_conns: 5
  max_lifetime: 30m

jwt:
  issuer: smartstay-auth
  access_ttl: 15m
  refresh_ttl: 168h
